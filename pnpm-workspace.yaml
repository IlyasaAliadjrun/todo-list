packages:
  - "apps/*"
  - "packages/*"

# Izinkan build script dependency yang memang butuh (Prisma mengunduh query
# engine; esbuild memasang binary; Nest telemetry). Diblokir default oleh pnpm 11.
# `onlyBuiltDependencies` dibaca pnpm standar (mis. CI GitHub Actions).
onlyBuiltDependencies:
  - "@nestjs/core"
  - "@prisma/client"
  - "@prisma/engines"
  - esbuild
  - prisma
# `allowBuilds` dipakai oleh lapisan supply-chain di lingkungan dev ini.
allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  prisma: true
