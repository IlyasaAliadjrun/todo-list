# docker-compose.prod.yml — stack produksi (self-host). Jalankan:
#   docker compose -f docker-compose.prod.yml up -d --build
# Wajib: .env produksi (secret kuat, S3_PUBLIC_ENDPOINT, WEB_ORIGIN, dsb).
# Untuk produksi sungguhan, terminasikan TLS di depan `web` (reverse proxy/HTTPS)
# agar refresh-token cookie (Secure) terkirim. Lihat docs/deployment.md.

name: notion-clone-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?wajib diisi}
      POSTGRES_DB: ${POSTGRES_DB:-notion}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notion} -d ${POSTGRES_DB:-notion}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    # Tag RELEASE.* bersifat immutable — jangan pakai :latest (bisa lompat versi diam-diam
    # saat rebuild). Samakan dengan docker-compose.yml. Upgrade = ganti tag secara sadar,
    # cek changelog dulu (MinIO pernah membuang fitur Console di rilis tertentu).
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?wajib diisi}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?wajib diisi}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY} &&
      mc mb --ignore-existing local/${S3_BUCKET:-notion-uploads} &&
      mc anonymous set download local/${S3_BUCKET:-notion-uploads}
      "

  # Jalankan migration sekali sebelum API start.
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-notion}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-notion}?schema=public
    working_dir: /repo/packages/db
    command: ["node_modules/.bin/prisma", "migrate", "deploy"]
    depends_on:
      postgres: { condition: service_healthy }
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      DATABASE_URL: postgresql://${POSTGRES_USER:-notion}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-notion}?schema=public
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: "${S3_PUBLIC_ENDPOINT:?URL MinIO/S3 publik (diakses browser) wajib diisi}"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
    restart: unless-stopped
    depends_on:
      - api
    # Tidak mem-publish port: satu-satunya jalan masuk adalah `caddy` (TLS).

  # Terminasi TLS (sertifikat sendiri, lihat ./certs). Satu-satunya service terekspos internet.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      APP_DOMAIN: "${APP_DOMAIN:?domain aplikasi wajib diisi, mis. https://notes.akasha.co.id}"
      # Nama bucket untuk route storage di Caddyfile — samakan dengan S3_BUCKET.
      S3_BUCKET: "${S3_BUCKET:-notion-uploads}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Sertifikat TLS sendiri: taruh fullchain.pem & privkey.pem di ./certs pada host.
      - ./certs:/etc/caddy/certs:ro
      - caddydata:/data
      - caddyconfig:/config
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    depends_on:
      - web
      - minio

volumes:
  pgdata:
  redisdata:
  miniodata:
  caddydata:
  caddyconfig:
