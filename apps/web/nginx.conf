# Nginx produksi: sajikan SPA statis + proxy REST & WebSocket ke service `api`.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  client_max_body_size 5m;

  # Aset ber-hash: cache panjang.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # REST API → service api.
  # Whitelist = segmen rute teratas SEMUA @Controller di apps/api/src (verifikasi:
  # grep -rE '@Controller\(' apps/api/src). Harus sinkron dengan `apiProxy` di
  # apps/web/vite.config.ts — prefix baru yang lupa ditambah di sini akan 404 di
  # produksi meski jalan di dev. (`search` masuk lewat `workspaces/:id/search`.)
  location ~ ^/(health|auth|admin|invitations|workspaces|pages|databases|properties|rows|views|uploads)(/|$) {
    proxy_pass http://api:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Kolaborasi real-time (WebSocket Hocuspocus).
  location /collab {
    proxy_pass http://api:3001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
  }

  # SPA fallback (TanStack Router).
  location / {
    try_files $uri /index.html;
  }
}
